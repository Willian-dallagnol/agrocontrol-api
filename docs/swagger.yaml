      - BearerAuth: []
      summary: Atualizar safra
      tags:
      - seasons
  /api/v1/users:
    get:
      description: Retorna todos os usuários do sistema. Apenas admin.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.UserResponse'
            type: array
      security:
      - BearerAuth: []
      summary: Listar usuários
      tags:
      - users
    post:
      consumes:
      - application/json
      description: 'Cria um novo usuário. Apenas admin pode criar usuários. Roles
        disponíveis: admin, manager, operator.'
      parameters:
      - description: Dados do usuário
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "409":
          description: Email já cadastrado
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Criar usuário
      tags:
      - users
  /api/v1/users/{id}:
    get:
      description: Retorna os dados de um usuário específico. Apenas admin.
      parameters:
      - description: ID do usuário
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UserResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Buscar usuário por ID
      tags:
      - users
  /auth/login:
    post:
      consumes:
      - application/json
      description: Autentica o usuário e retorna um token JWT válido por 24h
      parameters:
      - description: Credenciais de login
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LoginResponse'
        "400":
          description: Dados inválidos
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "401":
          description: Email ou senha incorretos
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      summary: Login do usuário
      tags:
      - auth
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
