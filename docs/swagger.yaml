    - AlertPriorityMedium
    - AlertPriorityHigh
  entities.AlertStatus:
    enum:
    - open
    - resolved
    - ignored
    type: string
    x-enum-varnames:
    - AlertStatusOpen
    - AlertStatusResolved
    - AlertStatusIgnored
  entities.AlertType:
    enum:
    - low_stock
    - expired_input
    - pest
    - weather
    - pending_application
    - harvest_soon
    type: string
    x-enum-varnames:
    - AlertTypeLowStock
    - AlertTypeExpiredInput
    - AlertTypePest
    - AlertTypeWeather
    - AlertTypePending
    - AlertTypeHarvestSoon
  entities.ApplicationType:
    enum:
    - fertilizer
    - herbicide
    - fungicide
    - insecticide
    - correctant
    - biological
    type: string
    x-enum-varnames:
    - AppTypeFertilizer
    - AppTypeHerbicide
    - AppTypeFungicide
    - AppTypeInsecticide
    - AppTypeCorrectant
    - AppTypeBiological
  entities.FieldStatus:
    enum:
    - active
    - inactive
    - fallow
    type: string
    x-enum-comments:
      FieldStatusFallow: pousio
    x-enum-descriptions:
    - ""
    - ""
    - pousio
    x-enum-varnames:
    - FieldStatusActive
    - FieldStatusInactive
    - FieldStatusFallow
  entities.InputCategory:
    enum:
    - fertilizer
    - herbicide
    - fungicide
    - insecticide
    - correctant
    - biological
    - seed
    - other
    type: string
    x-enum-varnames:
    - InputCategoryFertilizer
    - InputCategoryHerbicide
    - InputCategoryFungicide
    - InputCategoryInsecticide
    - InputCategoryCorrectant
    - InputCategoryBiological
    - InputCategorySeed
    - InputCategoryOther
  entities.MonitoringType:
    enum:
    - insect
    - disease
    - weed
    - nutritional
    type: string
    x-enum-comments:
      MonTypeDisease: doença
      MonTypeInsect: praga inseto
      MonTypeNutri: deficiência nutricional
      MonTypeWeed: planta daninha
    x-enum-descriptions:
    - praga inseto
    - doença
    - planta daninha
    - deficiência nutricional
    x-enum-varnames:
    - MonTypeInsect
    - MonTypeDisease
    - MonTypeWeed
    - MonTypeNutri
  entities.PlantingStatus:
    enum:
    - active
    - harvested
    - lost
    type: string
    x-enum-varnames:
    - PlantingStatusActive
    - PlantingStatusHarvested
    - PlantingStatusLost
  entities.SeasonStatus:
    enum:
    - planning
    - active
    - finished
    type: string
    x-enum-varnames:
    - SeasonStatusPlanning
    - SeasonStatusActive
    - SeasonStatusFinished
  entities.Severity:
    enum:
    - low
    - moderate
    - high
    - critical
    type: string
    x-enum-varnames:
    - SeverityLow
    - SeverityModerate
    - SeverityHigh
    - SeverityCritical
  utils.ErrorResponse:
    properties:
      code:
        type: string
      error:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API REST de gestão agrícola com autenticação JWT
  title: AgroControl API
  version: "1.0"
paths:
  /api/v1/alerts:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.AlertResponse'
            type: array
      security:
      - BearerAuth: []
      summary: Listar todos os alertas
      tags:
      - alerts
    post:
      consumes:
      - application/json
      description: Cria um alerta manual. Alertas automáticos são criados pelo sistema
        ao detectar estoque baixo ou monitoramento urgente.
      parameters:
      - description: Dados do alerta
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateAlertRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.AlertResponse'
      security:
      - BearerAuth: []
      summary: Criar alerta
      tags:
      - alerts
  /api/v1/alerts/{id}:
    get:
      parameters:
      - description: ID do alerta
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.AlertResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Buscar alerta por ID
      tags:
      - alerts
  /api/v1/alerts/{id}/status:
    patch:
      consumes:
      - application/json
      description: Atualiza o status do alerta (open, resolved, ignored). Ao resolver,
        registra o timestamp de resolução.
      parameters:
      - description: ID do alerta
        in: path
        name: id
        required: true
        type: integer
      - description: Novo status
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateAlertStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.AlertResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Atualizar status do alerta
      tags:
      - alerts
  /api/v1/alerts/open:
    get:
      description: Retorna apenas alertas com status 'open', ordenados por prioridade.
        Limite de 20 alertas.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.AlertResponse'
            type: array
      security:
      - BearerAuth: []
      summary: Listar alertas abertos
      tags:
      - alerts
  /api/v1/applications:
    get:
      parameters:
      - description: Página
        in: query
        name: page
        type: integer
      - description: Itens por página
        in: query
        name: limit
        type: integer
      - description: Filtrar por talhão
        in: query
        name: field_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.PaginatedResponse'
      security:
      - BearerAuth: []
      summary: Listar aplicações
      tags:
      - applications
    post:
      consumes:
      - application/json
      description: Registra uma aplicação de insumo em um talhão. Debita o estoque
        automaticamente e cria alerta se estoque ficar baixo.
      parameters:
      - description: Dados da aplicação
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateApplicationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.ApplicationResponse'
        "422":
          description: Estoque insuficiente ou talhão inativo
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Registrar aplicação de insumo
      tags:
      - applications
