      - reports
  /api/v1/seasons:
    get:
      parameters:
      - description: Página
        in: query
        name: page
        type: integer
      - description: Itens por página
        in: query
        name: limit
        type: integer
      - description: Busca por nome
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.PaginatedResponse'
      security:
      - BearerAuth: []
      summary: Listar safras
      tags:
      - seasons
    post:
      consumes:
      - application/json
      description: Cadastra uma nova safra com período de início e fim. Valida que
        data_fim > data_inicio.
      parameters:
      - description: Dados da safra
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateSeasonRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.SeasonResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "422":
          description: Data fim anterior à data início
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Criar safra
      tags:
      - seasons
  /api/v1/seasons/{id}:
