basePath: /
definitions:
  dto.AdjustStockRequest:
    properties:
      quantity:
        type: number
      reason:
        type: string
    required:
    - quantity
    - reason
    type: object
  dto.AlertResponse:
    properties:
      created_at:
        type: string
      created_by:
        type: integer
      description:
        type: string
      id:
        type: integer
      priority:
        $ref: '#/definitions/entities.AlertPriority'
      ref_id:
        type: integer
      ref_type:
        type: string
      resolved_at:
        type: string
      status:
        $ref: '#/definitions/entities.AlertStatus'
      title:
        type: string
      type:
        $ref: '#/definitions/entities.AlertType'
    type: object
  dto.ApplicationResponse:
    properties:
      application_date:
        type: string
      application_type:
        $ref: '#/definitions/entities.ApplicationType'
      created_at:
        type: string
      created_by:
        type: integer
      dose_per_ha:
        type: number
      equipment:
        type: string
      field_id:
        type: integer
      field_name:
        type: string
      humidity:
        type: number
      id:
        type: integer
      input_id:
        type: integer
      input_name:
        type: string
      notes:
        type: string
      operator:
        type: string
      planting_id:
        type: integer
      spray_volume:
        type: number
      target:
        type: string
      temperature:
        type: number
      total_used:
        type: number
      wind_speed:
        type: number
    type: object
  dto.CreateAlertRequest:
    properties:
      description:
        type: string
      priority:
        allOf:
        - $ref: '#/definitions/entities.AlertPriority'
        enum:
        - low
        - medium
        - high
      ref_id:
        type: integer
      ref_type:
        type: string
      title:
        minLength: 3
        type: string
      type:
        allOf:
        - $ref: '#/definitions/entities.AlertType'
        enum:
        - low_stock
        - expired_input
        - pest
        - weather
        - pending_application
        - harvest_soon
    required:
    - title
    - type
    type: object
  dto.CreateApplicationRequest:
    properties:
      application_date:
        type: string
      application_type:
        allOf:
        - $ref: '#/definitions/entities.ApplicationType'
        enum:
        - fertilizer
        - herbicide
        - fungicide
        - insecticide
        - correctant
        - biological
      dose_per_ha:
        type: number
      equipment:
        type: string
      field_id:
        type: integer
      humidity:
        maximum: 100
        minimum: 0
        type: number
      input_id:
        type: integer
      notes:
        type: string
      operator:
        type: string
      planting_id:
        type: integer
      spray_volume:
        type: number
      target:
        type: string
      temperature:
        type: number
      wind_speed:
        minimum: 0
        type: number
    required:
    - application_date
    - application_type
    - dose_per_ha
    - field_id
    - input_id
    - operator
    type: object
  dto.CreateCropRequest:
    properties:
      cycle_days:
        type: integer
      name:
        maxLength: 100
        minLength: 2
        type: string
      plant_population:
        type: integer
      spacing_cm:
        type: number
      type:
        type: string
      variety:
        type: string
    required:
    - name
    type: object
  dto.CreateFarmRequest:
    properties:
      city:
        type: string
      location:
        type: string
      name:
        maxLength: 150
        minLength: 2
        type: string
      owner_name:
        maxLength: 150
        minLength: 2
        type: string
      state:
        type: string
      total_area:
        type: number
    required:
    - city
    - name
    - owner_name
    - state
    - total_area
    type: object
  dto.CreateFieldRequest:
    properties:
      area:
        type: number
      farm_id:
        type: integer
      name:
        maxLength: 100
        minLength: 2
        type: string
      soil_type:
        type: string
      status:
        allOf:
        - $ref: '#/definitions/entities.FieldStatus'
        enum:
        - active
        - inactive
        - fallow
    required:
    - area
    - farm_id
    - name
    type: object
  dto.CreateHarvestRequest:
    properties:
      field_loss:
        maximum: 100
        minimum: 0
        type: number
      grain_moisture:
        maximum: 100
        minimum: 0
        type: number
      harvest_date:
        type: string
      impurity:
        maximum: 100
        minimum: 0
        type: number
      notes:
        type: string
      planting_id:
        type: integer
      productivity_bag_ha:
        minimum: 0
        type: number
      productivity_kg_ha:
        minimum: 0
        type: number
      total_bags:
        minimum: 0
        type: number
    required:
    - harvest_date
    - planting_id
    type: object
  dto.CreateInputRequest:
    properties:
      batch_number:
        type: string
      category:
        allOf:
        - $ref: '#/definitions/entities.InputCategory'
        enum:
        - fertilizer
        - herbicide
        - fungicide
        - insecticide
        - correctant
        - biological
        - seed
        - other
      cost_per_unit:
        minimum: 0
        type: number
      expiration_date:
        type: string
      manufacturer:
        type: string
      min_stock_qty:
        minimum: 0
        type: number
      name:
        maxLength: 150
        minLength: 2
        type: string
      stock_qty:
        minimum: 0
        type: number
      unit:
        type: string
    required:
    - category
    - name
    - unit
    type: object
  dto.CreateMonitoringRequest:
    properties:
      crop_stage:
        type: string
      field_id:
        type: integer
      infestation_level:
        maximum: 100
        minimum: 0
        type: number
      inspection_date:
        type: string
      inspector:
        type: string
      notes:
        type: string
      planting_id:
        type: integer
      problem_name:
        minLength: 2
        type: string
      severity:
        allOf:
        - $ref: '#/definitions/entities.Severity'
        enum:
        - low
        - moderate
        - high
        - critical
      technical_rec:
        type: string
      type:
        allOf:
        - $ref: '#/definitions/entities.MonitoringType'
        enum:
        - insect
        - disease
        - weed
        - nutritional
      urgent:
        type: boolean
    required:
    - field_id
    - inspection_date
    - inspector
    - problem_name
    - severity
    - type
    type: object
  dto.CreatePlantingRequest:
    properties:
      crop_id:
        type: integer
      density_kg_ha:
        type: number
      depth_cm:
        type: number
      expected_harvest:
        type: string
      field_id:
        type: integer
      notes:
        type: string
      planting_date:
        type: string
      responsible:
        type: string
      season_id:
        type: integer
      seeds_used_kg:
        type: number
      spacing:
        type: number
    required:
    - crop_id
    - field_id
    - planting_date
    - season_id
    type: object
  dto.CreateSeasonRequest:
    properties:
      end_date:
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
      start_date:
        type: string
      status:
        allOf:
        - $ref: '#/definitions/entities.SeasonStatus'
        enum:
        - planning
        - active
        - finished
    required:
    - end_date
    - name
    - start_date
    type: object
  dto.CreateUserRequest:
    properties:
      email:
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
      password:
        minLength: 8
        type: string
      role:
        enum:
        - admin
        - manager
        - operator
        type: string
    required:
    - email
    - name
    - password
    - role
    type: object
  dto.CropResponse:
    properties:
      created_at:
        type: string
      cycle_days:
        type: integer
      id:
        type: integer
      name:
        type: string
      plant_population:
        type: integer
      spacing_cm:
        type: number
      type:
        type: string
      updated_at:
        type: string
      variety:
        type: string
    type: object
  dto.DashboardResponse:
    properties:
      active_plantings:
        type: integer
      applications_this_month:
        type: integer
      last_alerts:
        items:
          $ref: '#/definitions/dto.AlertResponse'
        type: array
      low_stock_inputs:
        type: integer
      open_alerts:
        type: integer
      total_farms:
        type: integer
      total_fields:
        type: integer
    type: object
  dto.FarmResponse:
    properties:
      city:
        type: string
      created_at:
        type: string
      created_by:
        type: integer
      id:
        type: integer
      location:
        type: string
      name:
        type: string
      owner_name:
        type: string
      state:
        type: string
      total_area:
        type: number
      updated_at:
        type: string
    type: object
  dto.FieldResponse:
    properties:
      area:
        type: number
      created_at:
        type: string
      created_by:
        type: integer
      farm_id:
        type: integer
      id:
        type: integer
      name:
        type: string
      soil_type:
        type: string
      status:
        $ref: '#/definitions/entities.FieldStatus'
      updated_at:
        type: string
    type: object
  dto.HarvestResponse:
    properties:
      created_at:
        type: string
      created_by:
        type: integer
      field_id:
        type: integer
      field_loss:
        type: number
      field_name:
        type: string
      grain_moisture:
        type: number
      harvest_date:
        type: string
      id:
        type: integer
      impurity:
        type: number
      notes:
        type: string
      planting_id:
        type: integer
      productivity_bag_ha:
        type: number
      productivity_kg_ha:
        type: number
      total_bags:
        type: number
      updated_at:
        type: string
    type: object
  dto.InputResponse:
    properties:
      active:
        type: boolean
      batch_number:
        type: string
      category:
        $ref: '#/definitions/entities.InputCategory'
      cost_per_unit:
        type: number
      created_at:
        type: string
      expiration_date:
        type: string
      id:
        type: integer
      low_stock:
        type: boolean
      manufacturer:
        type: string
      min_stock_qty:
        type: number
      name:
        type: string
      stock_qty:
        type: number
      unit:
        type: string
      updated_at:
        type: string
    type: object
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  dto.LoginResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/dto.UserResponse'
    type: object
  dto.MonitoringResponse:
    properties:
      created_at:
        type: string
      created_by:
        type: integer
      crop_stage:
        type: string
      field_id:
        type: integer
      field_name:
        type: string
      id:
        type: integer
      infestation_level:
        type: number
      inspection_date:
        type: string
      inspector:
        type: string
      notes:
        type: string
      planting_id:
        type: integer
      problem_name:
        type: string
      severity:
        $ref: '#/definitions/entities.Severity'
      technical_rec:
        type: string
      type:
        $ref: '#/definitions/entities.MonitoringType'
      updated_at:
        type: string
      urgent:
        type: boolean
    type: object
  dto.PaginatedResponse:
    properties:
      data: {}
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  dto.PlantingResponse:
    properties:
      created_at:
        type: string
      created_by:
        type: integer
      crop_id:
        type: integer
      crop_name:
        type: string
      density_kg_ha:
        type: number
      depth_cm:
        type: number
      expected_harvest:
        type: string
      field_id:
        type: integer
      field_name:
        type: string
      id:
        type: integer
      notes:
        type: string
      planting_date:
        type: string
      responsible:
        type: string
      season_id:
        type: integer
      season_name:
        type: string
      seeds_used_kg:
        type: number
      spacing:
        type: number
      status:
        $ref: '#/definitions/entities.PlantingStatus'
      updated_at:
        type: string
    type: object
  dto.SeasonResponse:
    properties:
      created_at:
        type: string
      created_by:
        type: integer
      end_date:
        type: string
      id:
        type: integer
      name:
        type: string
      start_date:
        type: string
      status:
        $ref: '#/definitions/entities.SeasonStatus'
      updated_at:
        type: string
    type: object
  dto.UpdateAlertStatusRequest:
    properties:
      status:
        allOf:
        - $ref: '#/definitions/entities.AlertStatus'
        enum:
        - open
        - resolved
        - ignored
    required:
    - status
    type: object
  dto.UpdateCropRequest:
    properties:
      cycle_days:
        type: integer
      name:
        maxLength: 100
        minLength: 2
        type: string
      plant_population:
        type: integer
      spacing_cm:
        type: number
      type:
        type: string
      variety:
        type: string
    required:
    - name
    type: object
  dto.UpdateFarmRequest:
    properties:
      city:
        type: string
      location:
        type: string
      name:
        maxLength: 150
        minLength: 2
        type: string
      owner_name:
        maxLength: 150
        minLength: 2
        type: string
      state:
        type: string
      total_area:
        type: number
    required:
    - city
    - name
    - owner_name
    - state
    - total_area
    type: object
  dto.UpdateFieldRequest:
    properties:
      area:
        type: number
      farm_id:
        type: integer
      name:
        maxLength: 100
        minLength: 2
        type: string
      soil_type:
        type: string
      status:
        allOf:
        - $ref: '#/definitions/entities.FieldStatus'
        enum:
        - active
        - inactive
        - fallow
    required:
    - area
    - farm_id
    - name
    - status
    type: object
  dto.UpdateInputRequest:
    properties:
      active:
        type: boolean
      batch_number:
        type: string
      cost_per_unit:
        minimum: 0
        type: number
      expiration_date:
        type: string
      manufacturer:
        type: string
      min_stock_qty:
        minimum: 0
        type: number
      name:
        maxLength: 150
        minLength: 2
        type: string
      unit:
        type: string
    required:
    - name
    - unit
    type: object
  dto.UpdatePlantingRequest:
    properties:
      expected_harvest:
        type: string
      notes:
        type: string
      responsible:
        type: string
      status:
        allOf:
        - $ref: '#/definitions/entities.PlantingStatus'
