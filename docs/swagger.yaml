        - harvested
        - lost
    type: object
  dto.UpdateSeasonRequest:
    properties:
      end_date:
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
      start_date:
        type: string
      status:
        allOf:
        - $ref: '#/definitions/entities.SeasonStatus'
        enum:
        - planning
        - active
        - finished
