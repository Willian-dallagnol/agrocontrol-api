      tags:
      - plantings
  /api/v1/reports/cost-per-field:
    get:
      description: Retorna o custo total de insumos aplicados por talhão, filtrado
        por fazenda e safra
      parameters:
      - description: Filtrar por talhão
        in: query
        name: field_id
        type: integer
      - description: Filtrar por fazenda
        in: query
        name: farm_id
        type: integer
      - description: Filtrar por safra
        in: query
        name: season_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.PaginatedResponse'
      security:
      - BearerAuth: []
      summary: Relatório de custo por talhão
      tags:
      - reports
  /api/v1/reports/productivity:
    get:
      description: Retorna produtividade por talhão em sacas/ha e kg/ha, filtrado
        por safra, fazenda e cultura
      parameters:
      - description: Filtrar por safra
        in: query
        name: season_id
        type: integer
      - description: Filtrar por fazenda
        in: query
        name: farm_id
        type: integer
      - description: Filtrar por cultura
        in: query
        name: crop_id
        type: integer
      - description: Página
        in: query
        name: page
        type: integer
      - description: Itens por página (máx 50)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.PaginatedResponse'
      security:
      - BearerAuth: []
      summary: Relatório de produtividade
